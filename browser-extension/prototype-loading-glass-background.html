<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IIVO Glass — Loading Background Preview</title>
    <!-- Extension prototype stage (content behind glass — not part of the glass) -->
    <link rel="stylesheet" href="prototype-dark-module.css" />
    <link rel="stylesheet" href="loading-glass-background.css" />
    <style>
      /* Preview chrome only */
      .preview-label {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 99;
        padding: 6px 12px;
        border-radius: 10px;
        font: 600 11px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(190, 220, 245, 0.75);
        background: rgba(8, 12, 20, 0.65);
        border: 1px solid rgba(80, 190, 255, 0.25);
        pointer-events: none;
      }
      .loading-glass-background {
        border-radius: 0;
      }
    </style>
  </head>
  <body>
    <p class="preview-label">LoadingGlassBackground — glass only</p>

    <!-- Same backdrop as extension prototype (desktop/content behind glass) -->
    <div class="browser-backdrop" aria-hidden="true">
      <div class="browser-toolbar">
        <span class="tb-dot"></span>
        <span class="tb-dot"></span>
        <span class="tb-dot"></span>
        <span class="tb-omnibox">design.com</span>
        <span class="tb-ext-indicator" aria-hidden="true">
          <img class="tb-ext-orb-img" src="assets/lens-ring.png" alt="" />
        </span>
      </div>
    </div>

    <div class="prototype-stage" style="min-height: 100vh; padding: 0">
      <div class="loading-glass-background" role="presentation" aria-label="Loading glass background">
        <span class="loading-glass-background__sheen" aria-hidden="true"></span>
        <span class="loading-glass-background__streak loading-glass-background__streak--a" aria-hidden="true"></span>
        <span class="loading-glass-background__streak loading-glass-background__streak--b" aria-hidden="true"></span>
        <span class="loading-glass-background__corner loading-glass-background__corner--tl" aria-hidden="true"></span>
        <span class="loading-glass-background__corner loading-glass-background__corner--tr" aria-hidden="true"></span>
        <span class="loading-glass-background__corner loading-glass-background__corner--bl" aria-hidden="true"></span>
        <span class="loading-glass-background__corner loading-glass-background__corner--br" aria-hidden="true"></span>
      </div>
    </div>
  </body>
</html>
