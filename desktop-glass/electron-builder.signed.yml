# Signed + notarized distribution config for IIVO Glass.
#
# Local dev builds use electron-builder.yml (unsigned). Run signed release with:
#   npm run package:mac:signed
#
# Required environment (notarytool via @electron/notarize):
#   APPLE_ID              Apple ID email (default in script: incawgnito.x@gmail.com)
#   APPLE_ID_PASSWORD     App-specific password (NOT your Apple ID login password)
#   APPLE_TEAM_ID         Apple Developer Team ID (default: 3WRBTRX524)
#
# The release script maps APPLE_ID_PASSWORD → APPLE_APP_SPECIFIC_PASSWORD for
# electron-builder v26, which reads notarization credentials from env vars only.
#
# Signing identity must exist in your login keychain, or provide CSC_LINK + CSC_KEY_PASSWORD.

appId: com.iivo.glass
productName: IIVO Glass
copyright: Copyright © 2026 Christopher Miles / IIVO

# Fail the build if any binary in the bundle is unsigned.
forceCodeSigning: true

directories:
  output: release
  buildResources: build

files:
  - out/**
  - package.json

npmRebuild: false
asar: true

extraResources:
  - from: glass-update-manifest.json
    to: glass-update-manifest.json

mac:
  category: public.app-category.productivity
  extendInfo:
    CFBundleName: IIVO Glass
    CFBundleDisplayName: IIVO Glass
    NSMicrophoneUsageDescription: >-
      IIVO Glass uses your microphone only when you tap the microphone button on the
      command bar to dictate a question.
    NSScreenCaptureUsageDescription: >-
      IIVO Glass captures your screen only when you use Capture or ask a visual
      question that needs to see your display.
    NSAudioCaptureUsageDescription: >-
      IIVO Glass captures system audio only when you choose System Audio and start
      listening from the command bar.
    NSCameraUsageDescription: >-
      IIVO Glass does not use the camera. This description is required by macOS for
      some media capture APIs.
  target:
    - dmg
    - zip
  icon: build/icon.icns
  type: distribution
  identity: "christopher miles (3WRBTRX524)"
  hardenedRuntime: true
  gatekeeperAssess: false
  # Same plist for main app, inherited child processes, Electron Framework, and login helper.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  entitlementsLoginHelper: build/entitlements.mac.plist
  # Temporarily off — submit manually: xcrun notarytool submit … after build
  notarize: true
  artifactName: ${productName}-${version}-${arch}-${os}.${ext}

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  title: ${productName} ${version}
  sign: true

publish:
  provider: github
  owner: chrismls101-maker
  repo: ai-council-runner
  vPrefixedTagName: true
  releaseType: release
