<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Q2 Executive Dashboard — IIVO</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 24px; color: #0f172a; }
    h1 { font-size: 1.5rem; }
    .metric { display: inline-block; margin: 12px 24px 12px 0; padding: 16px; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .down { color: #dc2626; font-weight: bold; }
    .up { color: #dc2626; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Q2 Executive Dashboard</h1>
  <div class="metric"><strong>MRR</strong><br /><span class="down">Down 12%</span> vs last quarter</div>
  <div class="metric"><strong>Churn</strong><br /><span class="up">Up 4%</span> monthly</div>
  <div class="metric"><strong>Support tickets</strong><br /><span class="up">Rising 18%</span> week over week</div>
  <p>Board review Friday. Priority: reduce churn and fix onboarding drop-off.</p>
</body>
</html>
